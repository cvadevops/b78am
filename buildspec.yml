version: 0.2

phases:
  install:
    runtime-versions:
      python: 3.11
    commands:
      - echo "Installing dependencies..."
      - cd my-web-app
      - python -m pip install --upgrade pip
      - pip install -r requirements.txt
      - python -m py_compile app.py

  build:
    commands:
      - echo "Build completed successfully."

artifacts:
  base-directory: my-web-app
  files:
    - '**/*'